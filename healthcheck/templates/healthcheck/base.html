<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKY Engineering</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #ffffff;
            border-right: 1px solid #dee2e6;
            padding-top: 20px;
        }
        .sidebar a {
            color: #333;
            text-decoration: none;
            padding: 10px 20px;
            display: block;
            font-weight: 500;
        }
        .sidebar a:hover {
            background-color: #f1f3f5;
            color: #0d6efd;
        }
        .main-content {
            padding: 20px;
        }
        .sky-brand {
            font-weight: bold;
            font-size: 1.5rem;
            color: #0d6efd;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container-fluid">
            <a class="navbar-brand sky-brand" href="/">SKY Engineering</a>
            
            <div class="d-flex align-items-center">
                <a href="#" class="nav-link me-3">Help</a>
                <a href="#" class="nav-link me-3">Contact Support</a>
                
                {% if user.is_authenticated %}
                    <span class="text-muted me-3">Welcome, {{ user.username }}</span>
                {% else %}
                    <a href="#" class="btn btn-outline-primary btn-sm">Sign In</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            
            <div class="col-md-2 sidebar">
                <a href="/">Dashboard</a>
                <a href="#">Teams</a>
                <a href="#">Departments</a>
                <a href="#">Organisation</a>
                <a href="#">Messages</a>
                <a href="#" class="text-primary">Schedule</a> <a href="#">Reports</a>
                <hr>
                <a href="#">Profile</a>
                <a href="#" class="text-danger">Logout</a>
            </div>

            <div class="col-md-10 main-content">
                
                {% block content %}
                {% endblock content %}
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
